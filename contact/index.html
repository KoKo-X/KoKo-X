<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="まちの手ざわりポータルへの問い合わせページ。掲載相談、店舗情報の修正、その他の相談を受け付けます。">
  <title>問い合わせ | まちの手ざわりポータル</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/js/main.js" defer></script>
</head>
<body data-page="static">
  <header class="site-header">
    <a class="brand" href="/" aria-label="まちの手ざわりポータルトップ">
      <span class="brand-mark" aria-hidden="true">ま</span>
      <span>まちの手ざわりポータル</span>
    </a>
    <nav class="site-nav" aria-label="主要メニュー">
      <a href="/">トップ</a>
      <a href="/bike/">バイク・車</a>
      <a href="/lounge/">バー・ラウンジ</a>
      <a href="/construction/">建築・職人</a>
      <a href="/for-shops/">掲載希望の方</a>
      <a href="/contact/">問い合わせ</a>
    </nav>
  </header>

  <main>
    <section class="section">
      <div class="section-heading">
        <p class="eyebrow">Contact</p>
        <h1>問い合わせ</h1>
        <p class="hero-lead" style="color: var(--muted);">掲載相談、店舗情報の修正、カテゴリ追加の相談はこちらから。</p>
      </div>

      <div class="contact-layout">
        <div class="contact-list">
          <article class="contact-card">
            <h2>掲載相談</h2>
            <p>無料一覧掲載、店舗専用LP制作、Googleマップ整備、SNS投稿文作成について相談できます。</p>
          </article>
          <article class="contact-card">
            <h2>店舗情報の修正</h2>
            <p>住所、営業時間、電話番号、Googleマップリンク、タグなどの修正依頼を受け付けます。</p>
          </article>
          <div class="notice-box">内容確認後、掲載可否や対応範囲を運営側で判断します。</div>
        </div>

        <form class="contact-form" data-contact-form>
          <label class="field">
            <span>お名前</span>
            <input name="name" autocomplete="name" required>
          </label>
          <label class="field">
            <span>メールアドレス</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
          <label class="field">
            <span>種別</span>
            <select name="type" required>
              <option value="">選択してください</option>
              <option>掲載相談</option>
              <option>店舗情報の修正</option>
              <option>その他</option>
            </select>
          </label>
          <label class="field">
            <span>内容</span>
            <textarea name="message" required></textarea>
          </label>
          <button class="button primary" type="submit">内容を確認する</button>
          <p class="form-message" data-contact-message hidden></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>まちの手ざわりポータル</p>
    <nav aria-label="フッターメニュー">
      <a href="/for-shops/">掲載希望の方</a>
      <a href="/contact/">問い合わせ</a>
    </nav>
  </footer>
</body>
</html>
