name: Deploy KoKo X to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production site
        run: |
          mkdir _site
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.agents/' \
            --exclude='.codex/' \
            --exclude='source-data/' \
            --exclude='scripts/' \
            --exclude='tools/' \
            --exclude='tmp/' \
            --exclude='design-samples/' \
            --exclude='engine-optimization-test/' \
            --exclude='engine-scroll-test/' \
            --exclude='engine-webgl-test/' \
            --exclude='CSS-GUIDE.md' \
            ./ _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
